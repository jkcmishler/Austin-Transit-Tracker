# fly.toml app configuration file generated for austin-transit-tracker on 2026-05-24T14:51:53-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'austin-transit-tracker'
primary_region = 'dfw'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '8080'
  NODE_OPTIONS = '--max-old-space-size=896'

[[mounts]]
  source = 'transit_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
