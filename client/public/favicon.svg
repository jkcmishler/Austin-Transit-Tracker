<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- departure board: dark plate with two illuminated rows -->
  <rect width="64" height="64" rx="10" fill="#0a0c12"/>
  <rect x="6" y="10" width="52" height="44" rx="4" fill="#181c27" stroke="#232733" stroke-width="1.5"/>
  <!-- top row: route badge + delay -->
  <rect x="11" y="16" width="14" height="10" rx="1.5" fill="#ffc857"/>
  <text x="18" y="24.2" font-family="ui-monospace, Menlo, monospace" font-size="9" font-weight="700" text-anchor="middle" fill="#0a0c12">7</text>
  <rect x="29" y="17" width="24" height="2" rx="1" fill="#ffc857" opacity="0.85"/>
  <rect x="29" y="22" width="16" height="2" rx="1" fill="#ffc857" opacity="0.45"/>
  <!-- bottom row: late indicator (orange) -->
  <rect x="11" y="32" width="14" height="10" rx="1.5" fill="#ff5e3a"/>
  <text x="18" y="40.2" font-family="ui-monospace, Menlo, monospace" font-size="9" font-weight="700" text-anchor="middle" fill="#0a0c12">22</text>
  <rect x="29" y="33" width="20" height="2" rx="1" fill="#ff5e3a" opacity="0.85"/>
  <rect x="29" y="38" width="14" height="2" rx="1" fill="#ff5e3a" opacity="0.45"/>
  <!-- LED tick at bottom-right -->
  <circle cx="52" cy="48" r="1.6" fill="#ffc857"/>
</svg>
